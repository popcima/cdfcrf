<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05070A;
  --accent:#DC2626;
  --muted:#8A94A6;
  --hi:#EEF1F6;
  --card-bg:rgba(255,255,255,0.06);
  --card-border:rgba(255,255,255,0.08);
  --btn-bg:rgba(255,255,255,0.07);
  --btn-border:rgba(255,255,255,0.12);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--hi);font-family:'Inter',system-ui,-apple-system,sans-serif;overflow-x:hidden;line-height:1.5}

/* ── HERO ── */
.hero{position:relative;width:100%;height:100dvh;background:#000;overflow:hidden}
.hero-backdrop{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:opacity .6s;z-index:0}
/* Trailer background */
.hero-trailer-bg{position:absolute;inset:0;z-index:1;overflow:hidden;pointer-events:none;opacity:0;transition:opacity 1.4s ease}
.hero-trailer-bg.visible{opacity:1}
.hero-trailer-bg iframe{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100vw;height:calc(100vw * 9 / 16);min-height:100dvh;min-width:calc(100dvh * 16 / 9);border:0;pointer-events:none}
.hero.playing .hero-trailer-bg{opacity:0}
.hero-grad-l{position:absolute;inset:0;z-index:2;background:linear-gradient(90deg,rgba(5,7,10,.75) 0%,rgba(5,7,10,.35) 45%,transparent 70%)}
.hero-grad-b{position:absolute;inset:0;z-index:2;background:linear-gradient(180deg,rgba(5,7,10,.3) 0%,transparent 20%,transparent 55%,#05070A 100%)}

/* Floating hero nav buttons */
.hero-top-left{position:absolute;top:max(22px,calc(env(safe-area-inset-top)+12px));left:4%;z-index:20}
.hero-top-right{position:absolute;top:max(22px,calc(env(safe-area-inset-top)+12px));right:4%;z-index:20}
.hero-circle-btn{
  width:40px;height:40px;border-radius:50%;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);
  color:var(--hi);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s cubic-bezier(.4,0,.2,1);
  backdrop-filter:blur(8px);
}
.hero-circle-btn:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.35)}

/* Hero info */
.hero-info{
  position:absolute;bottom:22%;left:4%;
  width:min(560px,52%);z-index:10;
  transition:opacity .45s,transform .45s;
}
.hero.playing .hero-info{opacity:0;pointer-events:none;transform:translateY(16px)}

.hero-logo-img{max-width:min(340px,80%);max-height:90px;object-fit:contain;object-position:left bottom;margin-bottom:16px;filter:drop-shadow(0 2px 10px rgba(0,0,0,.7));display:none}
.hero-title-txt{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,6.5vw,76px);line-height:1;letter-spacing:1.5px;color:#fff;margin-bottom:14px;text-shadow:0 1px 4px rgba(0,0,0,.65)}

.hero-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:14px;margin-bottom:13px}
.meta-star{color:var(--accent);font-size:13px}
.meta-score{color:#fff;font-weight:600}
.meta-sep{color:rgba(255,255,255,.25);font-size:12px}
.meta-item{color:var(--muted)}

.hero-desc{font-size:15px;line-height:1.65;color:rgba(255,255,255,.72);margin-bottom:22px;display:-webkit-box;-webkit-line-clamp:3;line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

.hero-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.btn-play-hero{display:flex;align-items:center;gap:8px;background:#fff;color:#000;font-family:'Inter',sans-serif;font-size:16px;font-weight:600;padding:10px 28px;border-radius:9999px;border:none;cursor:pointer;box-shadow:0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px -4px rgba(0,0,0,.1);transition:background .2s cubic-bezier(.4,0,.2,1);white-space:nowrap}
.btn-play-hero:hover{background:rgba(255,255,255,.84)}
.btn-add{width:42px;height:42px;border-radius:50%;background:var(--btn-bg);border:1px solid rgba(255,255,255,.2);color:var(--hi);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s cubic-bezier(.4,0,.2,1),transform .2s;backdrop-filter:blur(4px)}
.btn-add:hover{background:rgba(255,255,255,.15);transform:scale(1.06)}
.btn-pill{display:flex;align-items:center;gap:7px;background:var(--btn-bg);border:1px solid var(--btn-border);color:var(--hi);font-family:'Inter',sans-serif;font-size:14px;font-weight:500;padding:9px 18px;border-radius:9999px;cursor:pointer;box-shadow:rgba(255,255,255,.06) 0 1px 0 0 inset;transition:background .2s cubic-bezier(.4,0,.2,1);white-space:nowrap;backdrop-filter:blur(4px)}
.btn-pill:hover{background:rgba(255,255,255,.13)}
.btn-pill-label{pointer-events:none}

/* ── CUSTOM VIDEO PLAYER ── */
.vid-player{position:absolute;inset:0;z-index:20;background:#000;display:none}
.hero.playing .vid-player{display:block}
.vid-el{width:100%;height:100%;display:block;object-fit:contain}
.vid-overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;cursor:pointer}
.vid-controls{padding:0 20px 20px;background:linear-gradient(transparent,rgba(0,0,0,.85));opacity:0;transform:translateY(6px);transition:opacity .25s,transform .25s;pointer-events:none}
.vid-overlay.ctrl-on .vid-controls{opacity:1;transform:translateY(0);pointer-events:auto}
.vid-prog-wrap{padding:10px 0;cursor:pointer}
.vid-prog-track{height:3px;background:rgba(255,255,255,.18);border-radius:2px;position:relative;transition:height .15s}
.vid-prog-wrap:hover .vid-prog-track{height:5px}
.vid-prog-buf{position:absolute;inset:0;background:rgba(255,255,255,.28);border-radius:2px;width:0;pointer-events:none}
.vid-prog-fill{position:absolute;inset:0;background:var(--accent);border-radius:2px;width:0;pointer-events:none}
.vid-bar{display:flex;align-items:center;justify-content:space-between;margin-top:2px}
.vid-left,.vid-right{display:flex;align-items:center;gap:2px}
.vid-btn{width:38px;height:38px;background:none;border:none;border-radius:8px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.vid-btn:hover{background:rgba(255,255,255,.1)}
.vid-vol-range{width:68px;height:3px;accent-color:#fff;cursor:pointer;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,.3);border-radius:2px;outline:none}
.vid-vol-range::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#fff;cursor:pointer}
.vid-time{font-size:12px;color:rgba(255,255,255,.75);padding:0 6px;white-space:nowrap;font-variant-numeric:tabular-nums;user-select:none}
.vid-time-sep{color:rgba(255,255,255,.3)}
.vid-ep-label{font-size:12px;color:rgba(255,255,255,.5);padding:0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.vid-ripple{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.vid-ripple-icon{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.15);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(.7)}
.vid-ripple-icon.pop{opacity:1;transform:scale(1);transition:opacity .1s,transform .1s}
.vid-ripple-icon.fade{opacity:0;transform:scale(1.2);transition:opacity .4s,transform .4s}
.vid-no-src{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:rgba(255,255,255,.35);text-align:center;padding:32px}
.vid-no-src p{font-size:16px;font-weight:500;color:rgba(255,255,255,.55)}
.vid-no-src span{font-size:12px}
/* Hide hero overlays when player is active */
.hero.playing .hero-top-left,
.hero.playing .hero-top-right,
.hero.playing .hero-grad-l,
.hero.playing .hero-grad-b,
.hero.playing .hero-backdrop{opacity:0;pointer-events:none}
/* Back button — always visible above iframe */
.back-btn{
  position:absolute;top:max(22px,calc(env(safe-area-inset-top)+12px));left:4%;z-index:30;
  display:none;align-items:center;gap:8px;
  background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.15);
  backdrop-filter:blur(12px);border-radius:9999px;
  padding:8px 18px 8px 14px;
  color:#fff;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;
  cursor:pointer;transition:background .2s;
}
.back-btn:hover{background:rgba(0,0,0,.82)}
.hero.playing .back-btn{display:flex}

/* ── BELOW HERO ── */
.below{background:var(--bg);padding:40px 4% 80px;margin-top:-1px;max-width:1400px;margin-left:auto;margin-right:auto}
.sec-block{margin-bottom:48px}
.sec-head{font-size:22px;font-weight:600;color:var(--hi);padding-left:12px;border-left:3px solid var(--accent);margin-bottom:16px;line-height:1.2}

/* ── EPISODES SECTION ── */
.ep-controls{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}

.season-btn{
  display:flex;align-items:center;gap:8px;
  background:linear-gradient(rgba(255,255,255,.035) 0%,rgba(255,255,255,.01) 100%);
  border:1px solid rgba(255,255,255,.12);
  border-radius:12px;
  padding:10px 16px;
  color:var(--hi);font-family:'Inter',sans-serif;font-size:14px;font-weight:500;
  cursor:pointer;
  box-shadow:rgba(255,255,255,.05) 0 1px 0 0 inset,rgba(0,0,0,.55) 0 6px 14px -6px;
  transition:border-color .15s;white-space:nowrap;flex-shrink:0;
  position:relative;
}
.season-btn:hover{border-color:rgba(220,38,38,.3)}
.season-dropdown{
  position:absolute;top:calc(100%+8px);left:0;min-width:160px;
  background:#111318;border:1px solid rgba(255,255,255,.12);
  border-radius:12px;padding:8px;z-index:100;
  box-shadow:0 16px 40px rgba(0,0,0,.6);
  display:none;
}
.season-dropdown.open{display:block}
.season-opt{
  padding:10px 14px;border-radius:8px;font-size:14px;color:var(--hi);
  cursor:pointer;transition:background .15s;
}
.season-opt:hover{background:rgba(255,255,255,.06)}
.season-opt.active{color:var(--accent)}

.ep-search-wrap{flex:1;min-width:180px;position:relative}
.ep-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.ep-search{
  width:100%;
  background:linear-gradient(rgba(255,255,255,.035) 0%,rgba(255,255,255,.01) 100%);
  border:1px solid rgba(255,255,255,.12);
  border-radius:12px;
  padding:10px 14px 10px 38px;
  color:var(--hi);font-family:'Inter',sans-serif;font-size:14px;
  box-shadow:rgba(255,255,255,.05) 0 1px 0 0 inset,rgba(0,0,0,.55) 0 6px 14px -6px;
  outline:none;transition:border-color .15s;
}
.ep-search::placeholder{color:var(--muted)}
.ep-search:focus{border-color:rgba(220,38,38,.3)}

.sort-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  background:linear-gradient(rgba(255,255,255,.035) 0%,rgba(255,255,255,.01) 100%);
  border:1px solid rgba(255,255,255,.12);
  border-radius:12px;padding:10px 14px;
  color:var(--muted);font-family:'Inter',sans-serif;font-size:13px;
  cursor:pointer;
  box-shadow:rgba(255,255,255,.05) 0 1px 0 0 inset,rgba(0,0,0,.55) 0 6px 14px -6px;
  transition:border-color .15s,color .15s;flex-shrink:0;white-space:nowrap;
}
.sort-btn:hover{border-color:rgba(220,38,38,.3);color:var(--accent)}

/* Episode list */
.ep-list{display:flex;flex-direction:column;gap:10px}
.ep-card{
  display:flex;align-items:flex-start;gap:16px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;padding:14px;
  cursor:pointer;
  transition:background .2s cubic-bezier(.4,0,.2,1),border-color .2s;
}
.ep-card:hover{background:rgba(255,255,255,.07);border-color:rgba(220,38,38,.3)}
.ep-card.upcoming{opacity:.5;cursor:default;pointer-events:none}

.ep-thumb-wrap{
  position:relative;flex-shrink:0;
  width:260px;border-radius:10px;overflow:hidden;
  aspect-ratio:16/9;background:rgba(255,255,255,.06);
  transition:box-shadow .2s;
}
.ep-card:hover .ep-thumb-wrap{box-shadow:0 0 0 2px rgba(220,38,38,.35)}
.ep-thumb{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s cubic-bezier(.25,.46,.45,.94)}
.ep-card:hover .ep-thumb{transform:scale(1.04)}
.ep-num-badge{
  position:absolute;bottom:7px;left:7px;
  background:rgba(0,0,0,.72);backdrop-filter:blur(4px);
  border-radius:6px;padding:2px 8px;
  font-family:'Roboto Mono',monospace;font-size:11px;color:rgba(255,255,255,.9);
}
.ep-playing-badge{
  position:absolute;top:7px;left:7px;
  background:rgba(0,0,0,.75);backdrop-filter:blur(4px);
  border-radius:4px;padding:3px 7px;
  display:none;align-items:center;gap:4px;font-size:9px;color:var(--accent);
}
.ep-card.now-playing .ep-playing-badge{display:flex}
.ep-bar{width:2.5px;background:var(--accent);border-radius:2px;animation:ep-eq .7s ease-in-out infinite alternate}
.ep-bar:nth-child(1){height:4px;animation-delay:0s}
.ep-bar:nth-child(2){height:10px;animation-delay:.15s}
.ep-bar:nth-child(3){height:6px;animation-delay:.3s}
@keyframes ep-eq{from{transform:scaleY(.3)}to{transform:scaleY(1)}}

.ep-prog-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,.15)}
.ep-prog-fill{height:100%;background:var(--accent);border-radius:0 2px 2px 0}

.ep-content{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
.ep-top-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.ep-title-wrap{flex:1;min-width:0}
.ep-title{font-size:15px;font-weight:500;color:var(--hi);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .2s}
.ep-card:hover .ep-title{color:var(--accent)}
.ep-duration{font-size:12px;color:var(--muted)}
.ep-desc{font-size:13px;line-height:1.6;color:rgba(255,255,255,.5);display:-webkit-box;-webkit-line-clamp:3;line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.ep-download-btn{
  flex-shrink:0;width:34px;height:34px;border-radius:50%;
  background:none;border:none;color:var(--muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,color .2s;margin-top:-2px;
}
.ep-download-btn:hover{background:rgba(255,255,255,.05);color:var(--accent)}

.ep-load-more{
  display:flex;justify-content:center;padding:16px 0 0;
}
.ep-load-btn{
  background:var(--btn-bg);border:1px solid var(--btn-border);
  color:var(--hi);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;
  padding:9px 24px;border-radius:9999px;cursor:pointer;
  transition:background .2s;
}
.ep-load-btn:hover{background:rgba(255,255,255,.12)}

/* ── ACTORS GRID — single-col vertical list on mobile, 2-col on tablet+ ── */
.actors-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:0}
.actor-card{display:flex;flex-direction:row;align-items:center;text-align:left;width:auto;min-width:0;background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:10px 14px;gap:12px;cursor:default;transition:background .2s cubic-bezier(.4,0,.2,1),border-color .2s}
.actor-card:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.15)}
.actor-photo{width:46px;height:46px;border-radius:50%;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,.08);transition:box-shadow .2s}
.actor-card:hover .actor-photo{box-shadow:0 0 0 2px rgba(255,255,255,.18)}
.actor-info{flex:1;min-width:0}
.actor-name{font-size:13px;font-weight:500;color:var(--hi);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px;transition:color .2s}
.actor-card:hover .actor-name{color:#fff}
.actor-char{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── SIMILAR SHOWS GRID — mobile-first 2-col poster ── */
.movies-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;align-items:start}
.movie-rec{cursor:pointer;min-width:0;overflow:hidden}
/* wrapper owns the aspect-ratio — height exists even with no/missing image */
.movie-rec-img-wrap{
  width:100%;aspect-ratio:2/3;
  overflow:hidden;border-radius:12px;
  background:rgba(255,255,255,.06);margin-bottom:8px;
}
.movie-rec-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s cubic-bezier(.22,1,.36,1)}
.movie-rec:hover .movie-rec-img{transform:scale(1.04)}
.movie-rec-title{font-size:13px;font-weight:500;color:var(--hi);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px;transition:color .2s}
.movie-rec:hover .movie-rec-title{color:var(--accent)}
.movie-rec-meta{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)}
.rec-star{color:var(--accent)}
.rec-dot{color:rgba(255,255,255,.2)}

/* ── SKELETON ── */
.skel{background:linear-gradient(90deg,rgba(255,255,255,.04) 0%,rgba(255,255,255,.09) 50%,rgba(255,255,255,.04) 100%);background-size:200%;animation:sh 1.4s ease-in-out infinite;border-radius:8px}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── RESPONSIVE ── */

/* Actors: 2-col on tablet+, photo slightly larger */
@media(min-width:700px){
  .actors-grid{grid-template-columns:repeat(2,1fr)}
  .actor-photo{width:56px;height:56px}
  .actor-card{padding:12px 14px}
}
@media(min-width:1100px){
  .actors-grid{grid-template-columns:repeat(3,1fr)}
}

/* Similar shows: backdrop 16:9 on desktop */
@media(min-width:700px){
  .movies-grid{grid-template-columns:repeat(3,1fr);gap:14px}
  .movie-rec-img-wrap{aspect-ratio:16/9;border-radius:10px;margin-bottom:10px}
  .movie-rec-title{font-size:13px}
  .movie-rec-meta{font-size:11px;gap:5px}
}
@media(min-width:1100px){
  .movies-grid{grid-template-columns:repeat(4,1fr)}
}

/* Episode cards: responsive */
@media(max-width:768px){

<script>
let SITE_CONFIG = {};
fetch('config.json').then(r=>r.json()).then(c=>{ SITE_CONFIG=c; }).catch(()=>{});

const KEY = '893e1103dea135f74d571b3ae1794603';
const API = 'https://api.themoviedb.org/3';
const IMG = 'https://image.tmdb.org/t/p';
const params = new URLSearchParams(location.search);
const ID = params.get('id') || '124364'; // FROM (2022)

const hero    = document.getElementById('hero');
const backBtn = document.getElementById('back-btn');

let sortAsc     = true;
let currentEps  = [];
let allSeasons  = [];
let currentSeason = 1;

// ── STUDIO VIDEO DETECTION ────────────────────────────
let studioVideo = 'universal.mp4';

function getStudioVideo(companies, networks, providers) {
  // providers = flatrate array from /watch/providers (most reliable for streaming services)
  const pNames = (providers || []).map(p => (p.provider_name || '').toLowerCase());
  const pIds   = (providers || []).map(p => p.provider_id);

  if(pNames.some(n => n.includes('netflix'))   || pIds.includes(8))   return 'netflix.mp4';
  if(pIds.includes(337) || pNames.some(n => n.includes('disney plus') || n.includes('disney+'))) return 'disney.mp4';
  if(pIds.includes(9)   || pNames.some(n => n.includes('prime video')||n.includes('amazon prime'))) return 'primevideo.mp4';
  if(pIds.includes(15)  || pNames.some(n => n.includes('hulu')))       return 'hulu.mp4';
  if(pIds.some(id=>[384,1899,49].includes(id)) || pNames.some(n => n.includes('hbo')||n.includes('max'))) return 'warner.mp4';
  if(pIds.includes(531) || pNames.some(n => n.includes('paramount+'))) return 'paramount.mp4';
  if(pIds.includes(73)  || pNames.some(n => n.includes('tubi')))       return 'tubi.mp4';

  // Fall back to production companies + networks
  const cNames = [...(companies||[]), ...(networks||[])].map(c => (c.name||'').toLowerCase());
  if(cNames.some(n => n.includes('netflix')))                               return 'netflix.mp4';
  if(cNames.some(n => n.includes('marvel')))                                return 'marvel.mp4';
  if(cNames.some(n => n.includes('disney') || n.includes('pixar')))        return 'disney.mp4';
  if(cNames.some(n => n.includes('warner') || n.includes('hbo')))          return 'warner.mp4';
  if(cNames.some(n => n.includes('sony') || n.includes('columbia') || n.includes('tristar'))) return 'sony.mp4';
  if(cNames.some(n => n.includes('paramount')))                             return 'paramount.mp4';
  if(cNames.some(n => n.includes('amazon') || n.includes('prime')))        return 'primevideo.mp4';
  if(cNames.some(n => n.includes('hulu')))                                  return 'hulu.mp4';
  if(cNames.some(n => n.includes('aniplex')))                               return 'aniplex.mp4';
  if(cNames.some(n => n.includes('tubi')))                                  return 'tubi.mp4';
  if(cNames.some(n => n.includes('universal')))                             return 'universal.mp4';
  return 'universal.mp4';
}

// ── VIDEO PLAYER ──────────────────────────────────────
const vidEl      = document.getElementById('vid-el');
const vidOverlay = document.getElementById('vid-overlay');
const vidNoSrc   = document.getElementById('vid-no-src');
const vidPlayBtn = document.getElementById('vid-play-btn');
const vidVolBtn  = document.getElementById('vid-vol-btn');
const vidVolRange= document.getElementById('vid-vol-range');
const vidProgWrap= document.getElementById('vid-prog-wrap');
const vidProgBuf = document.getElementById('vid-prog-buf');
const vidProgFill= document.getElementById('vid-prog-fill');
const vidCur     = document.getElementById('vid-cur');
const vidDur     = document.getElementById('vid-dur');
const vidFsBtn   = document.getElementById('vid-fs-btn');
const vidRipple  = document.getElementById('vid-ripple-icon');
const vidEpLabel = document.getElementById('vid-ep-label');

const PLAY_ICON ='<svg width="20" height="20" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>';
const PAUSE_ICON='<svg width="20" height="20" viewBox="0 0 24 24" fill="white"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>';
const VOL_ON    ='<polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M15.54,8.46a5,5,0,0,1,0,7.07"/><path d="M19.07,4.93a10,10,0,0,1,0,14.14"/>';
const VOL_OFF   ='<polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>';

let ctrlTimer=null;

function fmtTime(s){if(!s||isNaN(s))return'0:00';const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=Math.floor(s%60);return h?`${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`:`${m}:${String(sec).padStart(2,'0')}`;}

function showCtrl(){
  vidOverlay.classList.add('ctrl-on');
  clearTimeout(ctrlTimer);
  if(!vidEl.paused) ctrlTimer=setTimeout(()=>vidOverlay.classList.remove('ctrl-on'),3000);
}

function flashRipple(icon){
  vidRipple.innerHTML=icon;
  vidRipple.classList.remove('pop','fade');
  void vidRipple.offsetWidth;
  vidRipple.classList.add('pop');
  setTimeout(()=>{vidRipple.classList.remove('pop');vidRipple.classList.add('fade');},300);
}

function togglePlay(){
  if(vidEl.paused){vidEl.play().catch(()=>{});flashRipple(PAUSE_ICON);}
  else{vidEl.pause();flashRipple(PLAY_ICON);}
}

function updateVolIcon(){
  document.getElementById('vid-vol-icon').innerHTML=(vidEl.muted||vidEl.volume===0)?VOL_OFF:VOL_ON;
}

vidEl.addEventListener('play',()=>{vidPlayBtn.innerHTML=PAUSE_ICON;showCtrl();});
vidEl.addEventListener('pause',()=>{vidPlayBtn.innerHTML=PLAY_ICON;showCtrl();});
vidEl.addEventListener('timeupdate',()=>{
  const pct=vidEl.duration?(vidEl.currentTime/vidEl.duration)*100:0;
  vidProgFill.style.width=pct+'%';
  vidCur.textContent=fmtTime(vidEl.currentTime);
});
vidEl.addEventListener('durationchange',()=>{vidDur.textContent=fmtTime(vidEl.duration);});
vidEl.addEventListener('progress',()=>{
  if(vidEl.buffered.length) vidProgBuf.style.width=(vidEl.buffered.end(vidEl.buffered.length-1)/vidEl.duration*100)+'%';
});

vidPlayBtn.addEventListener('click',(e)=>{e.stopPropagation();togglePlay();});
vidPlayBtn.addEventListener('touchend',(e)=>{e.stopPropagation();e.preventDefault();togglePlay();});

let dragging=false;
function getTouchX(e){return(e.touches?.[0]||e.changedTouches?.[0]||e).clientX;}
function seekTo(e){const r=vidProgWrap.getBoundingClientRect();vidEl.currentTime=Math.max(0,Math.min(1,(getTouchX(e)-r.left)/r.width))*(vidEl.duration||0);}
function trySeek(e){
  if(!adBlueUnlocked){
    clearTimeout(lockerTimer);
    vidEl.pause();
    const locker=window.showAdBlueLocker();
    locker.onUnlock(()=>{adBlueUnlocked=true;vidEl.play().catch(()=>{});});
    return;
  }
  seekTo(e);
}
vidProgWrap.addEventListener('mousedown',(e)=>{e.stopPropagation();if(!adBlueUnlocked){trySeek(e);return;}dragging=true;seekTo(e);});
document.addEventListener('mousemove',(e)=>{if(dragging)seekTo(e);});
document.addEventListener('mouseup',()=>{dragging=false;});
vidProgWrap.addEventListener('click',(e)=>{e.stopPropagation();trySeek(e);});
vidProgWrap.addEventListener('touchstart',(e)=>{e.stopPropagation();if(!adBlueUnlocked){trySeek(e);return;}dragging=true;seekTo(e);},{passive:false});
document.addEventListener('touchmove',(e)=>{if(dragging){e.preventDefault();seekTo(e);}},{passive:false});
document.addEventListener('touchend',()=>{dragging=false;});

vidVolBtn.addEventListener('click',(e)=>{e.stopPropagation();vidEl.muted=!vidEl.muted;updateVolIcon();});
vidVolBtn.addEventListener('touchend',(e)=>{e.stopPropagation();e.preventDefault();vidEl.muted=!vidEl.muted;updateVolIcon();});
vidVolRange.addEventListener('input',(e)=>{e.stopPropagation();vidEl.volume=+vidVolRange.value;vidEl.muted=vidEl.volume===0;updateVolIcon();});

vidFsBtn.addEventListener('click',(e)=>{
  e.stopPropagation();
  const vp=document.getElementById('vid-player');
  if(!document.fullscreenElement) vp.requestFullscreen?.();
  else document.exitFullscreen?.();
});
vidFsBtn.addEventListener('touchend',(e)=>{
  e.stopPropagation();e.preventDefault();
  const vp=document.getElementById('vid-player');
  if(vp.webkitEnterFullscreen) vp.querySelector('video')?.webkitEnterFullscreen?.();
  else if(!document.fullscreenElement) vp.requestFullscreen?.();
  else document.exitFullscreen?.();
});

vidOverlay.addEventListener('mousemove',showCtrl);
vidOverlay.addEventListener('click',(e)=>{if(e.target===vidOverlay||e.target===vidEl)togglePlay();else showCtrl();});

// touch: tap to show/hide controls; buttons handle their own touchend
let tapTimer=null;
vidOverlay.addEventListener('touchend',(e)=>{
  if(e.target!==vidOverlay&&e.target!==vidEl) return;
  e.preventDefault();
  if(tapTimer){clearTimeout(tapTimer);tapTimer=null;togglePlay();}
  else{tapTimer=setTimeout(()=>{tapTimer=null;showCtrl();},250);}
});

let adBlueUnlocked = false;
let lockerTimer = null;
let hlsInstance = null;

function setVideoSource(src){
  const isHLS = src.includes('.m3u') || src.includes('m3u8');
  if(isHLS){
    if(hlsInstance){ hlsInstance.destroy(); hlsInstance=null; }
    if(Hls.isSupported()){
      hlsInstance = new Hls();
      hlsInstance.loadSource(src);
      hlsInstance.attachMedia(vidEl);
    } else if(vidEl.canPlayType('application/vnd.apple.mpegurl')){
      vidEl.src = src;
    }
  } else {
    if(hlsInstance){ hlsInstance.destroy(); hlsInstance=null; }
    if(vidEl.getAttribute('src')!==src) vidEl.src=src;
  }
}

function enterPlayer(s, ep){
  if(trailerIframe) trailerIframe.contentWindow.postMessage(JSON.stringify({event:'command',func:'pauseVideo',args:[]}),'https://www.youtube.com');
  vidNoSrc.style.display='none';
  setVideoSource(studioVideo);
  vidEl.currentTime=0;
  vidEpLabel.textContent=`S${s||1} E${ep||1}`;
  hero.classList.add('playing');
  showCtrl();
  vidEl.play().catch(()=>{});
  window.scrollTo({top:0,behavior:'smooth'});

  // Show locker after N seconds if not already unlocked
  if(!adBlueUnlocked){
    clearTimeout(lockerTimer);
    const delay = (SITE_CONFIG.lockerDelay || 5) * 1000;
    lockerTimer = setTimeout(()=>{
      if(!adBlueUnlocked && hero.classList.contains('playing')){
        vidEl.pause();
        const locker = window.showAdBlueLocker();
        locker.onUnlock(()=>{
          adBlueUnlocked = true;
          vidEl.play().catch(()=>{});
        });
      }
    }, delay);
  }
}

function exitPlayer(){
  hero.classList.remove('playing');
  vidEl.pause();
  clearTimeout(lockerTimer);
  if(trailerIframe) trailerIframe.contentWindow.postMessage(JSON.stringify({event:'command',func:'playVideo',args:[]}),'https://www.youtube.com');
}



document.getElementById('play-hero-btn').addEventListener('click',()=>enterPlayer(1,1));
backBtn.addEventListener('click',exitPlayer);
document.addEventListener('keydown',(e)=>{
  if(!hero.classList.contains('playing')) return;
  if(e.code==='Escape') exitPlayer();
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.code==='ArrowRight'){e.preventDefault();vidEl.currentTime=Math.min(vidEl.currentTime+10,vidEl.duration||0);}
  if(e.code==='ArrowLeft'){e.preventDefault();vidEl.currentTime=Math.max(vidEl.currentTime-10,0);}
  if(e.code==='KeyF') vidFsBtn.click();
  if(e.code==='KeyM'){vidEl.muted=!vidEl.muted;updateVolIcon();}
  showCtrl();
});

// ── EPISODES RENDER ──────────────────────────────
function renderEpisodes(eps, query=''){
  const list=document.getElementById('ep-list');
  list.innerHTML='';
  const today=new Date();
  const filtered=query?eps.filter(e=>e.name.toLowerCase().includes(query)):eps;
  if(!filtered.length){
    list.innerHTML='<div style="text-align:center;padding:32px;color:var(--muted);font-size:14px">No episodes found</div>';
    return;
  }
  filtered.forEach((ep,i)=>{
    const airDate=ep.air_date?new Date(ep.air_date):null;
    const upcoming=airDate&&airDate>today;
    const thumb=ep.still_path?`${IMG}/w300${ep.still_path}`:'';
    const mins=ep.runtime?`${ep.runtime} min`:'';
    const isActive=(currentSeason===1&&ep.episode_number===1&&i===0);

    const card=document.createElement('div');
    card.className='ep-card'+(upcoming?' upcoming':'')+(isActive?' now-playing':'');

    card.innerHTML=`
      <div class="ep-thumb-wrap">
        ${thumb?`<img class="ep-thumb" src="${thumb}" alt="${ep.name}" loading="lazy">`:''}
        <div class="ep-playing-badge">
          <div class="ep-bar"></div><div class="ep-bar"></div><div class="ep-bar"></div>
          Now Playing
        </div>
        <div class="ep-num-badge">${ep.episode_number}</div>
        ${!upcoming?`<div class="ep-prog-bar"><div class="ep-prog-fill" style="width:${isActive?35:0}%"></div></div>`:''}
      </div>
      <div class="ep-content">
        <div class="ep-top-row">
          <div class="ep-title-wrap">
            <div class="ep-title">${ep.name||`Episode ${ep.episode_number}`}</div>
            ${mins?`<div class="ep-duration">${mins}</div>`:''}
          </div>
          ${!upcoming?`<button class="ep-download-btn" title="Download">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M7.5 1v9"/><polyline points="3.5,6.5 7.5,10.5 11.5,6.5"/><line x1="1" y1="14" x2="14" y2="14"/></svg>
          </button>`:'<span style="font-size:11px;color:var(--muted);flex-shrink:0;padding-top:4px">Coming Soon</span>'}
        </div>
        <p class="ep-desc">${ep.overview||'No description available.'}</p>
      </div>`;

    if(!upcoming){
      card.addEventListener('click',(e)=>{
        if(e.target.closest('.ep-download-btn')) return;
        document.getElementById('play-label').textContent=`S${currentSeason} E${ep.episode_number}`;
        enterPlayer(currentSeason, ep.episode_number);
      });
    }
    list.appendChild(card);
  });
}

// ── LOAD SEASON EPISODES ─────────────────────────
async function loadSeason(n){
  currentSeason=n;
  document.getElementById('season-label').textContent=`Season ${n}`;
  document.querySelectorAll('.season-opt').forEach(o=>o.classList.toggle('active',+o.dataset.n===n));
  const r=await fetch(`${API}/tv/${ID}/season/${n}?api_key=${KEY}&language=en-US`);
  const data=await r.json();
  currentEps=data.episodes||[];
  if(sortAsc===false) currentEps=[...currentEps].reverse();
  renderEpisodes(currentEps,'');
  document.getElementById('ep-search').value='';
}

// ── TMDB MAIN FETCH ───────────────────────────────
async function get(path){
  const r=await fetch(`${API}${path}?api_key=${KEY}&language=en-US`);
  return r.json();
}

async function loadAll(){
  try{
    const [show,credits,similar,images,videos,watchProv]=await Promise.all([
      get(`/tv/${ID}`),
      get(`/tv/${ID}/credits`),
      get(`/tv/${ID}/similar`),
      fetch(`${API}/tv/${ID}/images?api_key=${KEY}&include_image_language=en,null`).then(r=>r.json()),
      get(`/tv/${ID}/videos`),
      fetch(`${API}/tv/${ID}/watch/providers?api_key=${KEY}`).then(r=>r.json()),
    ]);

    document.title=`${show.name} — Watch Free Online — Popcima`;

    // Dynamic SEO meta tags
    const seoDesc = show.overview ? show.overview.slice(0,160) : `Watch ${show.name} free in HD on Popcima.`;
    const seoImg  = show.backdrop_path ? `${IMG}/w1280${show.backdrop_path}` : 'https://popcima.com/og-image.jpg';
    const seoUrl  = `https://popcima.com/series-watch.html?id=${ID}`;
    document.querySelector('meta[name="description"]').setAttribute('content', seoDesc);
    document.getElementById('seo-canonical').setAttribute('href', seoUrl);
    document.getElementById('seo-og-url').setAttribute('content', seoUrl);
    document.getElementById('seo-og-title').setAttribute('content', `${show.name} — Watch Free Online — Popcima`);
    document.getElementById('seo-og-desc').setAttribute('content', seoDesc);
    document.getElementById('seo-og-image').setAttribute('content', seoImg);
    document.getElementById('seo-tw-title').setAttribute('content', `${show.name} — Watch Free Online — Popcima`);
    document.getElementById('seo-tw-desc').setAttribute('content', seoDesc);
    document.getElementById('seo-tw-image').setAttribute('content', seoImg);
    // JSON-LD: TVSeries
    const ldShow = document.createElement('script');
    ldShow.type = 'application/ld+json';
    ldShow.textContent = JSON.stringify({
      "@context": "https://schema.org",
      "@type": "TVSeries",
      "name": show.name,
      "description": show.overview || '',
      "image": show.poster_path ? `${IMG}/w500${show.poster_path}` : '',
      "datePublished": show.first_air_date || '',
      "genre": (show.genres||[]).map(g=>g.name),
      "numberOfSeasons": show.number_of_seasons || undefined,
      "numberOfEpisodes": show.number_of_episodes || undefined,
      "aggregateRating": show.vote_average ? {
        "@type": "AggregateRating",
        "ratingValue": show.vote_average.toFixed(1),
        "bestRating": "10",
        "ratingCount": show.vote_count || 0
      } : undefined,
      "url": seoUrl
    });
    document.head.appendChild(ldShow);
    // JSON-LD: VideoObject (Google video carousel)
    const ldVideo = document.createElement('script');
    ldVideo.type = 'application/ld+json';
    ldVideo.textContent = JSON.stringify({
      "@context": "https://schema.org",
      "@type": "VideoObject",
      "name": `${show.name} — Watch Free Online`,
      "description": seoDesc,
      "thumbnailUrl": seoImg,
      "uploadDate": show.first_air_date || new Date().toISOString().split('T')[0],
      "embedUrl": seoUrl,
      "contentUrl": seoUrl,
      "publisher": { "@type": "Organization", "name": "Popcima", "url": "https://popcima.com/" }
    });
    document.head.appendChild(ldVideo);
    // JSON-LD: BreadcrumbList
    const ldCrumb = document.createElement('script');
    ldCrumb.type = 'application/ld+json';
    ldCrumb.textContent = JSON.stringify({
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home",   "item": "https://popcima.com/" },
        { "@type": "ListItem", "position": 2, "name": "Series", "item": "https://popcima.com/series.html" },
        { "@type": "ListItem", "position": 3, "name": show.name, "item": seoUrl }
      ]
    });
    document.head.appendChild(ldCrumb);

    // Expose for content locker
    window.currentSeries = {
      title: show.name,
      poster: show.poster_path ? `${IMG}/w342${show.poster_path}` : ''
    };

    // Custom video override from config.json
    const customVid = SITE_CONFIG.videos?.tv?.[String(ID)];
    if(customVid){
      studioVideo = customVid;
    } else {
      // Detect studio video from watch providers + networks + production companies
      const provRegion = watchProv.results?.US || watchProv.results?.[Object.keys(watchProv.results||{})[0]] || {};
      const flatrate = provRegion.flatrate || [];
      studioVideo = getStudioVideo(show.production_companies, show.networks, flatrate);
    }

    // Backdrop (static fallback)
    const bd=show.backdrop_path?`${IMG}/original${show.backdrop_path}`:'';
    if(bd) document.getElementById('hero-backdrop').src=bd;

    // Trailer auto-play in background
    const clip=(videos.results||[]).find(v=>v.type==='Trailer'&&v.site==='YouTube')
             ||(videos.results||[]).find(v=>v.site==='YouTube');
    if(clip){
      const tBg=document.getElementById('hero-trailer-bg');
      trailerIframe=document.createElement('iframe');
      trailerIframe.src=`https://www.youtube.com/embed/${clip.key}?autoplay=1&mute=1&controls=0&loop=1&playlist=${clip.key}&playsinline=1&rel=0&modestbranding=1&enablejsapi=1`;
      trailerIframe.allow='autoplay; encrypted-media';
      trailerIframe.setAttribute('frameborder','0');
      tBg.appendChild(trailerIframe);
      setTimeout(()=>tBg.classList.add('visible'),2000);
    }

    // Logo
    const logos=(images.logos||[]).filter(l=>l.iso_639_1==='en'&&l.file_path);
    if(logos.length){
      const logoEl=document.getElementById('hero-logo-img');
      logoEl.src=`${IMG}/w500${logos[0].file_path}`;
      logoEl.style.display='block';
      document.getElementById('hero-title-txt').style.display='none';
    } else {
      document.getElementById('hero-title-txt').textContent=show.name||'—';
    }

    // Meta
    document.getElementById('meta-score').textContent=show.vote_average?show.vote_average.toFixed(1):'—';
    document.getElementById('meta-year').textContent=(show.first_air_date||'').slice(0,4)||'—';
    const genres=show.genres||[];
    [['mg1s','mg1'],['mg2s','mg2'],['mg3s','mg3']].forEach(([sep,item],i)=>{
      if(genres[i]){
        document.getElementById(sep).style.display='';
        document.getElementById(item).textContent=genres[i].name;
        document.getElementById(item).style.display='';
      }
    });
    document.getElementById('hero-desc').textContent=show.overview||'';
    document.getElementById('play-label').textContent='Play S1 E1';

    // Season dropdown
    allSeasons=(show.seasons||[]).filter(s=>s.season_number>0);
    const dd=document.getElementById('season-dropdown');
    allSeasons.forEach(s=>{
      const opt=document.createElement('div');
      opt.className='season-opt'+(s.season_number===1?' active':'');
      opt.dataset.n=s.season_number;
      opt.textContent=s.name||`Season ${s.season_number}`;
      opt.addEventListener('click',(e)=>{
        e.stopPropagation();
        seasonDD.classList.remove('open');
        if(s.season_number!==currentSeason) loadSeason(s.season_number);
      });
      dd.appendChild(opt);
    });

    // Show loaded content
    document.getElementById('loading-state').style.display='none';
    document.getElementById('content-full').style.display='block';

    // Load season 1
    await loadSeason(1);

    // Actors
    const actorsEl=document.getElementById('actors-grid');
    (credits.cast||[]).slice(0,12).forEach(c=>{
      const div=document.createElement('div');
      div.className='actor-card';
      const photo=c.profile_path?`${IMG}/w185${c.profile_path}`:'';
      div.innerHTML=`
        ${photo?`<img class="actor-photo" src="${photo}" alt="${c.name}" loading="lazy">`
               :`<div class="actor-photo" style="display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--muted)">${c.name[0]}</div>`}
        <div class="actor-info">
          <div class="actor-name">${c.name}</div>
          <div class="actor-char">${c.character||'—'}</div>
        </div>`;
      actorsEl.appendChild(div);
    });

    // Similar shows
    const moviesEl=document.getElementById('movies-grid');
    const isDesktop=window.innerWidth>=700;
    (similar.results||[]).slice(0,20).forEach(s=>{
      const card=document.createElement('div');
      card.className='movie-rec';
      const poster=s.poster_path?`${IMG}/w500${s.poster_path}`:'';
      const backdrop=s.backdrop_path?`${IMG}/w500${s.backdrop_path}`:'';
      const src=isDesktop?(backdrop||poster):(poster||backdrop);
      const score=s.vote_average?s.vote_average.toFixed(1):'—';
      const year=(s.first_air_date||'').slice(0,4);
      card.innerHTML=`
        <div class="movie-rec-img-wrap">
          ${src?`<img class="movie-rec-img" src="${src}" alt="${(s.name||'').replace(/"/g,'&quot;')}" loading="lazy">`:''}
        </div>
        <div class="movie-rec-title">${s.name||'—'}</div>
        <div class="movie-rec-meta">
          <span class="rec-star">★</span>
          <span>${score}</span>
          <span class="rec-dot">·</span>
          <span>${year}</span>
          <span class="rec-dot">·</span>
          <span>TV Show</span>
        </div>`;
      card.addEventListener('click',()=>location.href=`series-watch.html?id=${s.id}`);
      moviesEl.appendChild(card);
    });

  }catch(e){console.error('TMDB:',e);}
}

loadAll();
</script>
<script src="content-locker/adblue-config.js"></script>
<script src="content-locker/adbluemedia-locker.js"></script>
